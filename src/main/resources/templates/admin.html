<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>All Suggestions</title>
    <style>
        body{
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 30px auto;
        padding: 20px;
        background-color: #f7f7f7;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .card {
        background: white;
        border-radius: 6px;
        padding: 16px 20px;
        margin-bottom: 20px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        position: relative;
       }
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .desc {
        font-size: 16px;
        color: #555;
        line-height: 1.4;
        margin-bottom: 8px;
        }
    .tag {
            font-size: 13px;
            font-weight: bold;
            color: white;
            background-color: #6c757d;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .tag.public {
            background-color: #28a745;
        }
        .tag.private {
            background-color: #dc3545;
        }
        .success-msg {
            text-align: center;
            color: green;
            font-weight: bold;
            margin-bottom: 20px;
        }
         .error-msg {
            text-align: center;
            color: red;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .comment-box {
            margin-top: 12px;
        }
        textarea {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .comment-btn {
            margin-top: 6px;
            padding: 6px 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }
        .comment-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h2>All Suggestions</h2>
<p class="success-msg" th:if="${success}" th:text="${success}"></p>
<p class="error-msg" th:if="${error}" th:text="${error}"></p>

<!-- Suggestions -->
<div th:each="s : ${suggestions}" class="card">
    <div class="title" th:text="${s.title}">Title</div>
    <div class="desc" th:text="${s.description}">Description</div>
    <span th:classappend="${s.public} ? 'tag public' : 'tag private'"
          th:text="${s.public} ? 'Public' : 'Private'"></span>

    <div class="comment-box" th:if="${s.public}">
        <form th:action="@{/admin/comment/{id}(id=${s.id})}" method="post">
            <textarea id="hrComment" name="hrComment" rows="2" th:text="${s.hrComment}"></textarea>
            <button type="submit" class="comment-btn">Save Comment</button>
        </form>
    </div>
</div>
<a class="nav-link" th:href="@{/submit}">← Back to Suggestion Form</a>

</body>
</html>
