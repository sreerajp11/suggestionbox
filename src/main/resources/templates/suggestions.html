<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Submit Suggestion</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7fafd;
            padding: 40px 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #fff;
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            margin-top: 20px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        textarea {
            height: 120px;
        }

        .tip-box,
        .note-box {
            background-color: #e9f4ff;
            border-left: 4px solid #3399ff;
            padding: 12px 15px;
            margin-top: 10px;
            border-radius: 6px;
            color: #333;
            font-size: 0.95rem;
        }

        .checkbox-group {
            margin-top: 20px;
        }

        .checkbox-label {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
        }

        .checkbox-label input[type="checkbox"] {
            margin-right: 8px;
        }

        .submit-button {
            display: block;
            margin: 30px auto 0;
            padding: 12px 35px;
            font-size: 1rem;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-button:hover {
            background-color: #0056b3;
        }

        .success-msg {
            color: green;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .back-links {
            text-align: center;
            margin-top: 25px;
        }

        .back-links a {
            color: #007bff;
            text-decoration: none;
            margin: 0 10px;
        }

        .back-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Submit Your Suggestion</h2>

    <p class="success-msg" th:if="${success}" th:text="${success}"></p>

    <form th:action="@{/submit}" th:object="${suggestion}" method="post">

        <!-- Hidden department field -->
        <input type="hidden" th:field="*{department}" />

        <label for="title">Title</label>
        <input type="text" id="title" th:field="*{title}" required />

        <label for="description">Description</label>
        <textarea id="description" th:field="*{description}" required></textarea>

        <div class="tip-box">
            💡 Be clear with your description, as it will be difficult to followup incase of any clarifications.
        </div>

        <input type="hidden" name="isPublic" value="true" />
        <div class="checkbox-group">
            <label class="checkbox-label" title="Check this if you want only HR/Manager to see it. You won’t get a reply.">
                <input type="checkbox" name="makePrivate" onchange="document.getElementsByName('isPublic')[0].value = this.checked ? 'false' : 'true'" />
                Keep this suggestion private
            </label>
        </div>

        <div class="note-box">
             If you enable the checkbox, only HR/Manager can view it.And they will not be able to reply or followup on your suggestion.
        </div>

        <button type="submit" class="submit-button">Submit</button>
    </form>

    <div class="back-links">
        <a th:href="@{/}">← Back to Home</a>
        <a class="back-link"
           th:href="@{${suggestion.department == 'HR'} ? '/public/hr' : '/public/software'}"
           th:text="${suggestion.department == 'HR'} ? '→ View HR public suggestions' : '→ View software public suggestions'">
        </a>
    </div>
</div>

</body>
</html>
