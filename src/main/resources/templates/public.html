<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Public Suggestions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin-bottom: 8px;
        }
        .desc {
            font-size: 15px;
            color: #555;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .hr-comment-box {
            background-color: #eef6ff;
            border: 1px solid #007bff;
            border-radius: 6px;
            padding: 12px 15px;
            margin-top: 15px;
        }
        .hr-comment-box strong {
            color: #0056b3;
            font-size: 14px;
        }
        .hr-comment-box p {
            margin: 6px 0 0 0;
            font-size: 14px;
            color: #003366;
            line-height: 1.4;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h2>Public Suggestions</h2>

<div th:each="s : ${suggestions}" class="card">
    <div class="title" th:text="${s.title}">Title</div>
    <div class="desc" th:text="${s.description}">Description</div>

    <div class="hr-comment-box" th:if="${s.hrComment != null and !#strings.isEmpty(s.hrComment)}">
        <strong>HR Reply:</strong>
        <p th:text="${s.hrComment}"></p>
    </div>
</div>

<a class="back-link" th:href="@{/submit}">← Back to Suggestion Form</a>

</body>
</html>
